<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music App</title>
<style>
  body { background: #1a1a1a; color: #d4af7f; font-family: sans-serif; margin:0; padding:20px; }
  h1 { color: #b28cd3; text-align:center; }
  .hidden { display:none; }
  form { margin:10px 0; }
  input { padding:5px; margin:2px; border-radius:4px; border:none; }
  button { padding:5px 10px; margin:2px; border-radius:4px; border:none; cursor:pointer; background:#b28cd3; color:black; }
  #song-list { margin-top:20px; }
  .song-item { display:flex; justify-content:space-between; align-items:center; padding:5px; border-bottom:1px solid #444; cursor:pointer; }
  .song-item span { flex-grow:1; }
  #player { margin-top:20px; text-align:center; }
</style>
</head>
<body>

<h1>Music App</h1>

<!-- Login / Signup -->
<form id="login-form">
  <h3>Login</h3>
  <input type="email" name="email" placeholder="Email" required>
  <input type="password" name="password" placeholder="Password" required>
  <button type="submit">Login</button>
</form>

<form id="signup-form">
  <h3>Sign Up</h3>
  <input type="email" name="email" placeholder="Email" required>
  <input type="password" name="password" placeholder="Password" required>
  <button type="submit">Sign Up</button>
</form>

<button id="guest-btn">Continue as Guest</button>
<button id="logout-btn" class="hidden">Logout</button>

<!-- Song List -->
<div id="song-list"></div>

<!-- Player Controls -->
<div id="player">
  <div id="current-song">No song playing</div>
  <button id="prev-btn">Prev</button>
  <button id="play-btn">Play</button>
  <button id="next-btn">Next</button>
</div>

<!-- Include Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
<!-- App script -->
<script src="app.js"></script>

</body>
</html>
