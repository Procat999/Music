<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phoenix Music</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.2/dist/tailwind.min.css" rel="stylesheet">
<script type="module" src="https://cdn.jsdelivr.net/npm/lucide@0.264.0/dist/lucide.esm.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-black text-white font-sans">

<div class="p-4 flex justify-between items-center bg-[#0A0512]">
  <h1 class="text-3xl font-bold text-gradient bg-clip-text text-transparent bg-gradient-to-r from-[#A855F7] via-[#CD7F32] to-[#C06A80]">Phoenix</h1>
  <div>
    <button id="login-btn" class="bg-[#A855F7] px-4 py-2 rounded">Login</button>
    <button id="logout-btn" class="bg-[#CD7F32] px-4 py-2 rounded hidden">Logout</button>
  </div>
</div>

<div class="p-4 grid grid-cols-1 md:grid-cols-3 gap-6">
  <div class="col-span-2">
    <h2 class="text-xl font-bold mb-2">Trending Songs</h2>
    <div id="song-list"></div>
  </div>
  <div>
    <h2 class="text-xl font-bold mb-2">Playlists</h2>
    <button id="add-playlist-btn" class="mb-2 bg-[#A855F7] px-3 py-1 rounded text-black">+ Add Playlist</button>
    <div id="playlists"></div>
  </div>
</div>

<script type="module" src="js/supabase.js"></script>
<script type="module" src="js/auth.js"></script>
<script type="module" src="js/songs.js"></script>
<script type="module" src="js/playlists.js"></script>
<script type="module" src="js/app.js"></script>

</body>
</html>
