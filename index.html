<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DarkPlatform</title>

<style>

body{
background:#0e0e0e;
color:white;
font-family:Arial;
margin:0;
}

#topbar{
background:#161616;
padding:10px;
display:flex;
gap:10px;
align-items:center;
}

button{
background:#7c3aed;
border:none;
padding:8px 14px;
color:white;
cursor:pointer;
}

button:hover{
background:#6a2be0;
}

input{
background:#222;
border:none;
padding:8px;
color:white;
margin:4px;
}

.page{
display:none;
padding:20px;
}

.card{
background:#1b1b1b;
padding:12px;
margin-top:10px;
border-radius:6px;
}

</style>
</head>


<body>


<div id="topbar">

<button onclick="showPage('home')">Home</button>
<button onclick="showPage('profile')">Profile</button>
<button onclick="showPage('songs')">Songs</button>
<button onclick="showPage('albums')">Albums</button>

<button onclick="login()" style="margin-left:auto">Login</button>
<button onclick="logout()">Logout</button>

</div>


<div id="home" class="page" style="display:block">
<h2>Home</h2>
<div class="card">Welcome to the platform</div>
</div>


<div id="profile" class="page">
<h2>Profile</h2>

<input id="username" placeholder="username">
<button onclick="saveProfile()">save profile</button>

<div id="profileBox"></div>

</div>


<div id="songs" class="page">

<h2>Songs</h2>

<input id="songTitle" placeholder="song title">
<button onclick="uploadSong()">upload</button>

<div id="songList"></div>

</div>


<div id="albums" class="page">

<h2>Albums</h2>

<input id="albumTitle" placeholder="album title">
<button onclick="createAlbum()">create</button>

<div id="albumList"></div>

</div>



<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const supabaseUrl = "PASTE_SUPABASE_URL"
const supabaseKey = "PASTE_PUBLIC_ANON_KEY"

const supabase = window.supabase.createClient(supabaseUrl,supabaseKey)

let user = null



function showPage(p){

document.querySelectorAll(".page").forEach(x=>{
x.style.display="none"
})

document.getElementById(p).style.display="block"

}



async function login(){

await supabase.auth.signInWithOAuth({
provider:"google"
})

}



async function logout(){

await supabase.auth.signOut()
location.reload()

}



async function checkUser(){

const { data } = await supabase.auth.getUser()

user = data.user

if(user){

loadProfile()
loadSongs()
loadAlbums()

}

}



async function saveProfile(){

let name = document.getElementById("username").value

await supabase
.from("users")
.upsert({
id:user.id,
username:name
})

loadProfile()

}



async function loadProfile(){

let { data } = await supabase
.from("users")
.select("*")
.eq("id",user.id)
.single()

if(!data) return

document.getElementById("profileBox").innerHTML =
"<div class='card'>username: "+data.username+
"<br>followers: "+(data.followers||0)+"</div>"

}



async function uploadSong(){

let title = document.getElementById("songTitle").value

await supabase
.from("songs")
.insert({
creator:user.id,
title:title
})

loadSongs()

}



async function loadSongs(){

let { data } = await supabase
.from("songs")
.select("*")

let html=""

for(let s of data){

html += "<div class='card'>"+s.title+"</div>"

}

document.getElementById("songList").innerHTML = html

}



async function createAlbum(){

let title = document.getElementById("albumTitle").value

await supabase
.from("albums")
.insert({
creator:user.id,
title:title
})

loadAlbums()

}



async function loadAlbums(){

let { data } = await supabase
.from("albums")
.select("*")

let html=""

for(let a of data){

html += "<div class='card'>"+a.title+"</div>"

}

document.getElementById("albumList").innerHTML = html

}



checkUser()

</script>

</body>
</html>
