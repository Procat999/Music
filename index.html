<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Music</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js" defer></script>

</head>

<body>

<header>
<div class="logo">Music</div>

<div class="auth">
<button id="guestBtn">Guest</button>
<button id="loginBtn">Email Login</button>
<button id="googleBtn">Google</button>
</div>
</header>


<main>

<div id="profile">
<img id="pfp" src="https://i.imgur.com/2DhmtJ4.png">
<span id="username">Guest</span>
</div>


<h2>Trending</h2>

<div id="songs"></div>


<div id="player">

<button id="prev">⏮</button>
<button id="play">▶</button>
<button id="next">⏭</button>

<input id="volume" type="range" min="0" max="1" step="0.01">

<div id="songName">nothing playing</div>

</div>

</main>

</body>
</html>
