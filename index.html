<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phoenix Music</title>
<style>
  body { margin:0; font-family:sans-serif; background:#0A0512; color:#d4af7f; }
  header { display:flex; justify-content:space-between; align-items:center; padding:10px 20px; background:#1D0F35; }
  header h1 { color:#b28cd3; }
  header button { background:#b28cd3; color:black; border:none; padding:5px 10px; border-radius:4px; cursor:pointer; }

  main { display:flex; height:calc(100vh - 60px); overflow:hidden; }

  aside { width:250px; background:#180A2B; padding:15px; overflow-y:auto; }
  aside h3 { margin-top:0; }
  aside button { width:100%; margin-bottom:5px; }

  section { flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:20px; }

  #profile { display:flex; align-items:center; gap:10px; }
  #profile img { width:50px; height:50px; border-radius:50%; border:2px solid #b28cd3; }

  .song-item, .playlist-item { display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #444; cursor:pointer; }
  .song-item span, .playlist-item span { flex-grow:1; }

  #player { position:fixed; bottom:0; left:0; right:0; background:#1D0F35; padding:10px 20px; display:flex; align-items:center; gap:10px; }
  #volume { width:150px; }

  .hidden { display:none; }
</style>
</head>
<body>

<header>
  <h1>Phoenix Music</h1>
  <div>
    <button id="login-btn">Login</button>
    <button id="signup-btn">Sign Up</button>
    <button id="guest-btn">Continue as Guest</button>
    <button id="logout-btn" class="hidden">Logout</button>
  </div>
</header>

<main>
  <aside>
    <div id="profile" class="hidden">
      <img id="pfp" src="" alt="Profile">
      <span id="username"></span>
    </div>

    <h3>My Actions</h3>
    <button id="create-single">Create Single</button>
    <button id="create-album">Create Album</button>
    <button id="my-likes">My Likes</button>
    <button id="my-following">Following</button>
    <button id="listening-history">Listening History</button>
  </aside>

  <section>
    <div id="trending-songs">
      <h2>Trending Songs</h2>
      <div id="songs-list"></div>
    </div>
    <div id="playlists">
      <h2>Playlists</h2>
      <div id="playlists-list"></div>
    </div>
  </section>
</main>

<div id="player">
  <button id="prev-btn">Prev</button>
  <button id="play-btn">Play</button>
  <button id="next-btn">Next</button>
  <input id="volume" type="range" min="0" max="100" value="75">
  <span id="current-song">No song playing</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
<script src="app.js"></script>

</body>
</html>
