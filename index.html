<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhoenixMusic</title>
<style>
  body {margin:0; font-family:sans-serif; background:#0A0512; color:white; display:flex; justify-content:center; align-items:center; height:100vh;}
  .container {background:#1D0F35; border:2px solid #CD7F32; border-radius:16px; padding:40px; width:360px; text-align:center;}
  h1 {font-size:2rem; background:linear-gradient(90deg,#A855F7,#CD7F32); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:20px;}
  input {width:100%; padding:12px; margin-bottom:12px; border-radius:8px; border:1px solid #2A1B40; background:#11081F; color:white;}
  button {width:100%; padding:12px; margin-bottom:12px; border:none; border-radius:8px; background:linear-gradient(90deg,#A855F7,#CD7F32); color:white; font-weight:bold; cursor:pointer;}
  .guest-btn {background:#6D5D8A;}
  .error-msg {color:#FF5555; min-height:20px; margin-bottom:8px;}
  .toggle-password {cursor:pointer; color:#CD7F32; font-size:0.9rem; float:right; margin-top:-30px; margin-bottom:20px;}
</style>
</head>
<body>

<div class="container">
  <h1>PhoenixMusic</h1>
  <div class="error-msg" id="error-msg"></div>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <div class="toggle-password" id="toggle-password">Show</div>
  <button id="login-btn">Login</button>
  <button id="signup-btn">Sign Up</button>
  <button class="guest-btn" id="guest-btn">Continue as Guest</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/supabase.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const supabaseUrl = "https://zqgrdbmqlszjsrepnvcx.supabase.co";
  const supabaseKey = "sb_publishable_DjE9ANlxRd1AmDshacLfrw_VjV-_y7f";
  const supabase = supabase.createClient(supabaseUrl, supabaseKey);

  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const loginBtn = document.getElementById('login-btn');
  const signupBtn = document.getElementById('signup-btn');
  const guestBtn = document.getElementById('guest-btn');
  const togglePasswordBtn = document.getElementById('toggle-password');
  const errorMsg = document.getElementById('error-msg');

  togglePasswordBtn.addEventListener('click', () => {
    passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
    togglePasswordBtn.textContent = passwordInput.type === 'password' ? 'Show' : 'Hide';
  });

  async function loginEmail(email, password) {
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    return { user: data?.user, error };
  }

  async function signupEmail(email, password) {
    const { data, error } = await supabase.auth.signUp({ email, password });
    return { user: data?.user, error };
  }

  loginBtn.addEventListener('click', async () => {
    errorMsg.textContent = '';
    const email = emailInput.value.trim();
    const password = passwordInput.value;
    if(!email || !password){ errorMsg.textContent='Enter email & password'; return; }
    const { user, error } = await loginEmail(email,password);
    if(error) errorMsg.textContent = error.message;
    else location.reload();
  });

  signupBtn.addEventListener('click', async () => {
    errorMsg.textContent = '';
    const email = emailInput.value.trim();
    const password = passwordInput.value;
    if(!email || !password){ errorMsg.textContent='Enter email & password'; return; }
    const { user, error } = await signupEmail(email,password);
    if(error) errorMsg.textContent = error.message;
    else errorMsg.textContent = 'Signup successful! Check email to confirm.';
  });

  guestBtn.addEventListener('click', () => {
    alert('Guest mode active. Some features disabled.');
  });
});
</script>

</body>
</html>
