<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phoenix Music</title>
<style>
  body { margin:0; font-family:sans-serif; background:#0A0512; color:white; }
  .header { display:flex; justify-content:space-between; align-items:center; padding:1rem; background:#180A2B; }
  .btn { padding:0.5rem 1rem; cursor:pointer; background:#A855F7; border:none; border-radius:4px; color:white; }
  .container { padding:1rem; }
  .song { display:flex; justify-content:space-between; padding:0.5rem; border-bottom:1px solid #2A1B40; cursor:pointer; }
  .song:hover { background:#11081F; }
  .player { position:fixed; bottom:0; left:0; right:0; background:#0A0512; padding:1rem; display:flex; justify-content:center; align-items:center; gap:1rem; }
  .icon-btn { background:none; border:none; cursor:pointer; color:white; width:24px; height:24px; }
  #volume-slider { width:100px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <span style="font-weight:bold; font-size:1.5rem; background:linear-gradient(to right,#A855F7,#CD7F32); -webkit-background-clip:text; color:transparent;">Phoenix Music</span>
  </div>
  <div id="auth-buttons">
    <button class="btn" id="login-btn">Login</button>
    <button class="btn" id="signup-btn">Sign Up</button>
  </div>
  <div id="user-info" style="display:none;">
    <span id="user-email"></span>
    <button class="btn" id="logout-btn">Logout</button>
  </div>
</div>

<div class="container">
  <h2>Trending Songs</h2>
  <div id="songs-list"></div>
</div>

<div class="player">
  <button class="icon-btn" id="prev-btn">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m17 18-6-6 6-6"/><path d="M7 6v12"/></svg>
  </button>
  <button class="icon-btn" id="play-btn">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 5a2 2 0 0 1 3.008-1.728l11.997 6.998a2 2 0 0 1 .003 3.458l-12 7A2 2 0 0 1 5 19z"/></svg>
  </button>
  <button class="icon-btn" id="next-btn">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 18 6-6-6-6"/><path d="M17 6v12"/></svg>
  </button>
  <input type="range" id="volume-slider" min="0" max="100" value="75">
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
<script src="app.js"></script>
</body>
</html>
