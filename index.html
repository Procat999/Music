<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhoenixMusic</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.3/dist/tailwind.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
<style>
  body { background: #0A0512; color: white; }
  .btn { cursor: pointer; }
  .custom-scrollbar::-webkit-scrollbar { width: 8px; }
  .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
  .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #2A1B40; border-radius: 10px; }
  .custom-scrollbar:hover::-webkit-scrollbar-thumb { background-color: #A855F7; }
</style>
</head>
<body class="flex flex-col h-screen">

<div class="flex items-center justify-between p-4 bg-[#1D0F35]">
  <span class="font-bold text-xl bg-clip-text text-transparent bg-gradient-to-r from-[#A855F7] to-[#CD7F32]">PhoenixMusic</span>
  <div class="flex gap-2">
    <button id="login-btn" class="px-3 py-1 rounded-full bg-gradient-to-br from-[#A855F7] to-[#CD7F32]">Login</button>
    <button id="guest-btn" class="px-3 py-1 rounded-full border border-[#CD7F32]">Continue as Guest</button>
  </div>
</div>

<div class="flex flex-1 overflow-hidden">
  <aside class="w-64 p-4 border-r border-[#2A1B40] hidden md:block">
    <h2 class="text-[#CD7F32] font-bold mb-4">Menu</h2>
    <ul class="space-y-2">
      <li><i data-feather="home"></i> Home</li>
      <li><i data-feather="compass"></i> Explore</li>
      <li><i data-feather="music"></i> Library</li>
    </ul>
  </aside>

  <main class="flex-1 p-6 overflow-y-auto">
    <h1 class="text-3xl font-bold mb-4">Welcome <span id="user-name">Guest</span></h1>
    <div id="auth-section" class="mb-6">
      <p id="auth-msg">Please login to like songs, follow artists, and create playlists.</p>
    </div>

    <h2 class="text-xl font-bold mb-2">Trending Songs</h2>
    <div id="songs-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
  </main>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  // Initialize Supabase client
  const client = supabase.createClient(
    "https://zqgrdbmqlszjsrepnvcx.supabase.co",
    "sb_publishable_DjE9ANlxRd1AmDshacLfrw_VjV-_y7f"
  );

  // Elements
  const loginBtn = document.getElementById("login-btn");
  const guestBtn = document.getElementById("guest-btn");
  const userNameEl = document.getElementById("user-name");
  const authMsg = document.getElementById("auth-msg");
  const songsList = document.getElementById("songs-list");

  let currentUser = null;

  const SONGS = [
    { id: 1, title: "Ashes to Empire", artist: "The Embers", cover: "https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=100&auto=format&fit=crop" },
    { id: 2, title: "Violet Skies", artist: "Synthwave Dreams", cover: "https://images.unsplash.com/photo-1557672172-298e090bd0f1?q=80&w=100&auto=format&fit=crop" },
    { id: 3, title: "Golden Hour", artist: "Lunar Beats", cover: "https://images.unsplash.com/photo-1514525253161-7a46d19cd819?q=80&w=100&auto=format&fit=crop" }
  ];

  function renderSongs() {
    songsList.innerHTML = "";
    SONGS.forEach(song => {
      const div = document.createElement("div");
      div.className = "p-3 rounded-lg bg-[#11081F] flex items-center gap-3 cursor-pointer hover:bg-[#1D0F35]";
      div.innerHTML = `
        <img src="${song.cover}" class="w-12 h-12 rounded-lg"/>
        <div>
          <p class="font-bold">${song.title}</p>
          <p class="text-sm text-[#B3A3C9]">${song.artist}</p>
        </div>
        <button class="ml-auto px-2 py-1 rounded border border-[#CD7F32] btn">Like</button>
      `;
      div.querySelector("button").addEventListener("click", e => {
        e.stopPropagation();
        if (!currentUser) {
          alert("Please login to like songs!");
        } else {
          alert(`Liked ${song.title}`);
        }
      });
      songsList.appendChild(div);
    });
  }

  renderSongs();

  guestBtn.addEventListener("click", () => {
    currentUser = { name: "Guest" };
    userNameEl.textContent = "Guest";
    authMsg.textContent = "Limited access. Login to like songs and follow artists.";
  });

  loginBtn.addEventListener("click", async () => {
    const email = prompt("Enter your email:");
    const password = prompt("Enter your password:");
    if (!email || !password) return alert("Email and password required!");

    const { data, error } = await client.auth.signInWithPassword({ email, password });
    if (error) return alert("Login failed: " + error.message);

    currentUser = data.user;
    userNameEl.textContent = currentUser.email || "User";
    authMsg.textContent = "Logged in! You can now like songs, follow artists, and create playlists.";
  });

  feather.replace();
});
</script>
</body>
</html>
